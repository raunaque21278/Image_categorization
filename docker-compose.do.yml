# DigitalOcean production overrides
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.do.yml up -d --build

services:
  mongo:
    ports: []

  redis:
    ports: []

  api:
    ports: []
    restart: always
    environment:
      CORS_ORIGIN: ${CORS_ORIGIN:?Set CORS_ORIGIN to http://YOUR_DROPLET_IP}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}

  worker:
    restart: always
    environment:
      HF_API_KEY: ${HF_API_KEY:?Set HF_API_KEY in .env}

  frontend:
    restart: always
    ports:
      - "80:80"
