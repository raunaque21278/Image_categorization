services:
  mongo:
    image: mongo:7
    container_name: media-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    container_name: media-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: media-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      HOST: 0.0.0.0
      MONGO_URI: mongodb://mongo:27017/media-processing
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      UPLOADS_DIR: /data/uploads
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    volumes:
      - uploads-data:/data/uploads
    depends_on:
      - mongo
      - redis

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: media-worker
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/media-processing
      REDIS_HOST: redis
      REDIS_PORT: 6379
      HF_API_KEY: ${HF_API_KEY}
      UPLOADS_DIR: /data/uploads
      API_URL: http://api:5000
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/google-vision.json
    volumes:
      - uploads-data:/data/uploads
      - ${GOOGLE_VISION_KEY_PATH:-./worker/config/google-vision.json}:/secrets/google-vision.json:ro
    depends_on:
      - mongo
      - redis
      - api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: ""
        VITE_ASSETS_URL: ""
    container_name: media-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  mongo-data:
  uploads-data:
