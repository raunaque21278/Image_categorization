# Full stack — run with: docker compose up --build
# Requires .env (copy from .env.docker.example) and worker/config/google-vision.json

services:
  mongo:
    image: mongo:7
    container_name: media-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: media-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: media-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      HOST: 0.0.0.0
      MONGO_URI: mongodb://mongo:27017/media-processing
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      UPLOADS_DIR: /data/uploads
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    volumes:
      - uploads-data:/data/uploads
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: media-worker
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/media-processing
      REDIS_HOST: redis
      REDIS_PORT: 6379
      HF_API_KEY: ${HF_API_KEY:?Set HF_API_KEY in .env}
      UPLOADS_DIR: /data/uploads
      API_URL: http://api:5000
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/google-vision.json
    volumes:
      - uploads-data:/data/uploads
      - ${GOOGLE_VISION_KEY_PATH:-./worker/config/google-vision.json}:/secrets/google-vision.json:ro
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NGINX_CONFIG: nginx.compose.conf
        VITE_API_URL: /api
        VITE_SOCKET_URL: ""
        VITE_ASSETS_URL: ""
    container_name: media-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  mongo-data:
  uploads-data:
